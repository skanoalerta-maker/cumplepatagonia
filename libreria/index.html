<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Librería | CumplePatagonia</title>

  <style>
    *{margin:0;padding:0;box-sizing:border-box}

    :root{
      --morado:#5b2cff;
      --rosado:#e91e63;
      --verde:#25d366;
      --azul-oscuro:#17124a;
      --texto:#222;
      --suave:#f7f7fb;
    }

    body{
      font-family:Arial,sans-serif;
      background:#f7f7fb;
      color:var(--texto);
      overflow-x:hidden;
    }

    header{
      background:linear-gradient(135deg,var(--morado),var(--rosado));
      color:white;
      padding:28px 6%;
    }

    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;
      flex-wrap:wrap;
      max-width:1180px;
      margin:auto;
    }

    .logo{
      font-size:30px;
      font-weight:900;
      letter-spacing:-.5px;
    }

    .logo span{color:#ffd84d}

    .back{
      color:white;
      text-decoration:none;
      font-weight:900;
      background:rgba(255,255,255,.18);
      padding:11px 18px;
      border-radius:999px;
      box-shadow:0 10px 22px rgba(0,0,0,.10);
    }

    .hero{
      min-height:360px;
      padding:56px 6% 68px;
      background:
        radial-gradient(circle at 12% 20%, rgba(233,30,99,.16), transparent 30%),
        radial-gradient(circle at 88% 18%, rgba(91,44,255,.18), transparent 32%),
        linear-gradient(135deg,#fff0f7,#eef2ff);
      text-align:center;
      position:relative;
      overflow:hidden;
    }

    .hero::before{
      content:"";
      position:absolute;
      left:-20px;
      bottom:-10px;
      width:280px;
      height:210px;
      background:
        linear-gradient(0deg,#2667ff 0 26%,transparent 26% 34%,#ff4fa3 34% 60%,transparent 60% 68%,#7a45ff 68% 100%);
      border-radius:18px 18px 12px 12px;
      transform:rotate(-6deg);
      box-shadow:0 20px 50px rgba(91,44,255,.18);
      opacity:.82;
    }

    .hero::after{
      content:"";
      position:absolute;
      right:-22px;
      bottom:-12px;
      width:280px;
      height:210px;
      background:
        linear-gradient(0deg,#ffb632 0 28%,transparent 28% 36%,#ff4fa3 36% 62%,transparent 62% 70%,#2667ff 70% 100%);
      border-radius:18px 18px 12px 12px;
      transform:rotate(6deg);
      box-shadow:0 20px 50px rgba(233,30,99,.16);
      opacity:.82;
    }

    .decor{
      position:absolute;
      pointer-events:none;
      z-index:0;
    }

    .lapiz{
      width:135px;
      height:22px;
      border-radius:14px;
      background:linear-gradient(90deg,#6b44ff 0 15%,#f5d67d 15% 28%,#ffca3a 28% 83%,#f6f0d0 83% 92%,#3e2d29 92% 100%);
      box-shadow:0 10px 22px rgba(0,0,0,.10);
    }

    .lapiz.rosa{
      background:linear-gradient(90deg,#6b44ff 0 15%,#f5d67d 15% 28%,#ff5aad 28% 83%,#f6f0d0 83% 92%,#3e2d29 92% 100%);
    }

    .lapiz.azul{
      background:linear-gradient(90deg,#ff5aad 0 15%,#f5d67d 15% 28%,#6b44ff 28% 83%,#f6f0d0 83% 92%,#3e2d29 92% 100%);
    }

    .d1{left:62px;top:58px;transform:rotate(55deg)}
    .d2{left:225px;top:85px;transform:rotate(-50deg)}
    .d3{left:290px;bottom:82px;transform:rotate(22deg)}
    .d4{right:260px;top:115px;transform:rotate(54deg)}
    .d5{right:56px;top:80px;transform:rotate(-58deg)}
    .d6{right:300px;bottom:70px;transform:rotate(-25deg)}

    .punto{
      width:18px;
      height:18px;
      border-radius:50%;
      background:#ff5aad;
      opacity:.75;
    }

    .p1{left:16%;top:26%}
    .p2{left:36%;bottom:22%;background:#9b7cff}
    .p3{right:25%;top:25%;background:#ffd84d}
    .p4{right:13%;top:32%}
    .p5{left:19%;bottom:32%}

    .hero-content{
      position:relative;
      z-index:1;
      max-width:880px;
      margin:auto;
    }

    .hero h1{
      font-size:46px;
      margin-bottom:16px;
      color:var(--azul-oscuro);
      letter-spacing:-1px;
    }

    .hero p{
      max-width:760px;
      margin:auto;
      font-size:18px;
      line-height:1.6;
      color:#333a55;
    }

    .search-box{
      max-width:760px;
      margin:28px auto 0;
      display:flex;
      gap:10px;
      background:white;
      padding:10px;
      border-radius:18px;
      box-shadow:0 14px 36px rgba(0,0,0,.10);
    }

    .search-box input{
      flex:1;
      border:none;
      outline:none;
      font-size:16px;
      padding:14px;
    }

    .search-box button{
      border:none;
      background:var(--verde);
      color:white;
      font-weight:900;
      padding:0 24px;
      border-radius:14px;
      cursor:pointer;
      box-shadow:0 8px 18px rgba(37,211,102,.22);
    }

    .categorias{
      padding:42px 6% 16px;
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .cat-btn{
      border:none;
      background:white;
      color:#222a44;
      padding:12px 18px;
      border-radius:999px;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 8px 22px rgba(0,0,0,.07);
    }

    .cat-btn.active{
      background:var(--morado);
      color:white;
    }

    .titulo-catalogo{
      text-align:center;
      color:var(--azul-oscuro);
      font-size:26px;
      margin:22px 6% 8px;
      font-weight:900;
    }

    .linea{
      width:58px;
      height:4px;
      border-radius:99px;
      background:linear-gradient(90deg,var(--rosado),var(--morado));
      margin:0 auto 30px;
    }

    .catalogo{
      padding:0 1cm 76px;
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:1cm;
      max-width:1180px;
      margin:auto;
    }

    .producto{
      background:white;
      border-radius:22px;
      overflow:hidden;
      box-shadow:0 14px 34px rgba(0,0,0,.08);
      display:flex;
      flex-direction:column;
      min-height:430px;
      border:1px solid rgba(91,44,255,.06);
    }

    .producto-img{
      height:250px;
      background:white;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      border-bottom:1px solid #eee;
    }

    .producto-img img{
      width:100%;
      height:100%;
      object-fit:contain;
      padding:14px;
    }

    .sin-img{
      font-size:13px;
      color:#777;
      font-weight:900;
    }

    .producto-body{
      padding:20px;
      flex:1;
      display:flex;
      flex-direction:column;
      text-align:center;
    }

    .producto-body h3{
      font-size:17px;
      margin-bottom:8px;
      color:#11163b;
      line-height:1.3;
      min-height:44px;
    }

    .marca{
      font-size:14px;
      color:#66708a;
      margin-bottom:10px;
      min-height:18px;
    }

    .precio{
      font-size:24px;
      font-weight:900;
      color:var(--rosado);
      margin-bottom:16px;
    }

    .whatsapp-btn{
      margin-top:auto;
      display:block;
      text-align:center;
      background:var(--verde);
      color:white;
      text-decoration:none;
      font-weight:900;
      padding:13px;
      border-radius:14px;
      box-shadow:0 8px 18px rgba(37,211,102,.22);
    }

    .mensaje{
      grid-column:1/-1;
      text-align:center;
      font-weight:900;
      color:#555;
      padding:30px;
    }

    footer{
      background:#12123a;
      color:white;
      text-align:center;
      padding:30px 6%;
    }

    footer span{color:#ffd84d}

    @media(max-width:1000px){
      .hero::before,.hero::after{opacity:.35}
      .catalogo{
        grid-template-columns:repeat(2, minmax(0,1fr));
      }
    }

    @media(max-width:700px){
      header{padding:24px 5%}
      .logo{font-size:25px}
      .hero{padding:48px 5% 54px;min-height:auto}
      .hero h1{font-size:34px}
      .hero p{font-size:16px}
      .search-box{flex-direction:column}
      .search-box button{padding:14px}
      .catalogo{
        padding:0 18px 60px;
        grid-template-columns:1fr;
        gap:24px;
      }
      .producto-img{height:230px}
      .decor{display:none}
      .hero::before,.hero::after{display:none}
    }
  </style>
</head>

<body>

<header>
  <div class="top">
    <div class="logo">Cumple<span>Patagonia</span></div>
    <a class="back" href="../">← Volver al inicio</a>
  </div>
</header>

<section class="hero">
  <div class="decor lapiz d1"></div>
  <div class="decor lapiz rosa d2"></div>
  <div class="decor lapiz azul d3"></div>
  <div class="decor lapiz d4"></div>
  <div class="decor lapiz rosa d5"></div>
  <div class="decor lapiz azul d6"></div>
  <div class="decor punto p1"></div>
  <div class="decor punto p2"></div>
  <div class="decor punto p3"></div>
  <div class="decor punto p4"></div>
  <div class="decor punto p5"></div>

  <div class="hero-content">
    <h1>Librería y Papelería</h1>
    <p>
      Útiles escolares, artículos de escritorio, cuadernos, lápices, carpetas,
      marcadores, papelería y productos de oficina disponibles en Punta Arenas.
    </p>

    <div class="search-box">
      <input id="buscador" type="text" placeholder="Buscar cuadernos, lápices, carpetas...">
      <button onclick="filtrarProductos()">Buscar</button>
    </div>
  </div>
</section>

<div class="categorias">
  <button class="cat-btn active" onclick="filtrarCategoria('todos', this)">Todos</button>
  <button class="cat-btn" onclick="filtrarCategoria('escolar', this)">Escolar</button>
  <button class="cat-btn" onclick="filtrarCategoria('escritura', this)">Escritura</button>
  <button class="cat-btn" onclick="filtrarCategoria('papeleria', this)">Papelería</button>
  <button class="cat-btn" onclick="filtrarCategoria('archivo', this)">Archivo</button>
  <button class="cat-btn" onclick="filtrarCategoria('manualidades', this)">Manualidades</button>
  <button class="cat-btn" onclick="filtrarCategoria('oficina', this)">Oficina</button>
</div>

<h2 class="titulo-catalogo">Catálogo de productos</h2>
<div class="linea"></div>

<section class="catalogo" id="catalogo"></section>

<footer>
  <p><strong>Cumple<span>Patagonia</span></strong></p>
  <p>Librería · Papelería · Punta Arenas</p>
</footer>

<script>
let productos = [];
let categoriaActual = "todos";

async function cargarProductos(){
  try{
    const respuesta = await fetch("productos.json?v=" + Date.now());

    if(!respuesta.ok){
      throw new Error("No se encontró productos.json");
    }

    const data = await respuesta.json();
    productos = data.productos || data;

    render(productos);
  }catch(error){
    console.error("Error cargando productos:", error);
    document.getElementById("catalogo").innerHTML =
      '<div class="mensaje">No se pudo cargar el catálogo. Revisa que exista libreria/productos.json</div>';
  }
}

function formatoPrecio(valor){
  return "$" + Number(valor || 0).toLocaleString("es-CL");
}

function obtenerImagen(p){
  if(!p.imagen) return "";

  if(
    p.imagen.startsWith("http") ||
    p.imagen.startsWith("assets/") ||
    p.imagen.startsWith("./assets/")
  ){
    return p.imagen;
  }

  return "assets/productos/" + p.imagen;
}

function render(lista){
  const contenedor = document.getElementById("catalogo");
  contenedor.innerHTML = "";

  if(lista.length === 0){
    contenedor.innerHTML = '<div class="mensaje">No encontramos productos con esa búsqueda.</div>';
    return;
  }

  lista.forEach(p => {
    const nombre = p.nombre || "Producto";
    const marca = p.marca || "";
    const precio = p.precio || 0;
    const imagen = obtenerImagen(p);

    const mensaje = encodeURIComponent(
      "Hola CumplePatagonia, quiero consultar por: " + nombre
    );

    contenedor.innerHTML += `
      <div class="producto">
        <div class="producto-img">
          ${
            imagen
            ? `<img src="${imagen}" alt="${nombre}" onerror="this.parentElement.innerHTML='<span class=&quot;sin-img&quot;>Sin imagen</span>'">`
            : `<span class="sin-img">Sin imagen</span>`
          }
        </div>

        <div class="producto-body">
          <h3>${nombre}</h3>
          <div class="marca">${marca}</div>
          <div class="precio">${formatoPrecio(precio)}</div>
          <a class="whatsapp-btn" href="https://wa.me/56912345678?text=${mensaje}" target="_blank">
            Pedir por WhatsApp
          </a>
        </div>
      </div>
    `;
  });
}

function filtrarCategoria(cat, boton){
  categoriaActual = cat;

  document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
  boton.classList.add("active");

  filtrarProductos();
}

function filtrarProductos(){
  const texto = document.getElementById("buscador").value.toLowerCase().trim();

  const filtrados = productos.filter(p => {
    const nombre = (p.nombre || "").toLowerCase();
    const marca = (p.marca || "").toLowerCase();
    const categoria = (p.categoria_cumplepatagonia || p.categoria || "").toLowerCase();

    const coincideTexto =
      nombre.includes(texto) ||
      marca.includes(texto);

    const coincideCategoria =
      categoriaActual === "todos" ||
      categoria === categoriaActual;

    return coincideTexto && coincideCategoria;
  });

  render(filtrados);
}

document.getElementById("buscador").addEventListener("input", filtrarProductos);

cargarProductos();
</script>

</body>
</html>
